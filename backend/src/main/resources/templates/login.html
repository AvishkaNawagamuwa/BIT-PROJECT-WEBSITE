<!DOCTYPE html>
<html lang="en">

<!--
    සම්පත් සිල්ලර වෙළඳසැල - පිවිසුම් පිටුව
    Sampath Grocery Store - Login Page
    
    මෙම පිටුවේ විශේෂාංග:
    - ආරක්ෂිත පරිශීලක පිවිසුම
    - මුරපදය පෙන්වන්න/සඟවන්න සහාය
    - මට මතක තබාගන්න විශේෂාංගය
    - SweetAlert2 භාවිතා කරන විචිත්‍රවත් දෝෂ පණිවිඩ
    - සම්පූර්ණයෙන්ම responsive design
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sampath Grocery Store</title>

    <!-- Bootstrap CSS - UI Components සඳහා -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome - Icons සඳහා -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- SweetAlert2 CSS - විචිත්‍රවත් Alert පණිවිඩ සඳහා -->
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.min.css" rel="stylesheet">

    <!-- Custom CSS - අපේ විශේෂ styles -->
    <link rel="stylesheet" href="/css/common.css">
    <style>
        /* පිවිසුම් පිටුවේ විශේෂිත Styles */
        /* Login Page Specific Styles */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        .login-wrapper {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Blurred Background Image */
        .login-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><rect fill="%2322C55E" width="1920" height="1080"/></svg>');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px);
            transform: scale(1.1);
            z-index: 0;
        }

        /* Dark Overlay */
        .login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg,
                    rgba(34, 197, 94, 0.85) 0%,
                    rgba(16, 185, 129, 0.85) 50%,
                    rgba(5, 150, 105, 0.90) 100%);
            z-index: 1;
        }

        /* Login Card Container */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Premium Glass Card Effect */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-2xl);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            padding: 3rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Section */
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-primary);
            border-radius: var(--radius-full);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 4px 14px rgba(34, 197, 94, 0.3);
            }

            50% {
                transform: scale(1.05);
                box-shadow: 0 6px 20px rgba(34, 197, 94, 0.5);
            }
        }

        .logo-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control {
            padding: 0.75rem 1rem;
            padding-left: 2.75rem;
            border-radius: var(--radius-lg);
            border: 2px solid var(--medium-grey);
            font-size: 0.95rem;
            transition: all var(--transition-medium);
            background-color: var(--white);
        }

        .form-control:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        /* Input Icon Container */
        .input-icon-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.1rem;
            z-index: 1;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            padding: 0.25rem;
            z-index: 1;
            transition: color var(--transition-fast);
        }

        .password-toggle:hover {
            color: var(--primary-green);
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius-lg);
            background: var(--gradient-primary);
            border: none;
            color: white;
            box-shadow: var(--shadow-green);
            transition: all var(--transition-medium);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login i {
            margin-right: 0.5rem;
        }

        /* Remember Me Checkbox */
        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .form-check {
            display: flex;
            align-items: center;
        }

        .form-check-input {
            width: 1.125rem;
            height: 1.125rem;
            margin-right: 0.5rem;
            border-radius: var(--radius-xs);
            border: 2px solid var(--medium-grey);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--primary-green);
            border-color: var(--primary-green);
        }

        .form-check-label {
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
            user-select: none;
        }

        /* Forgot Password Link */
        .forgot-password {
            color: var(--primary-green);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .forgot-password:hover {
            color: var(--primary-green-dark);
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            position: relative;
            text-align: center;
            margin: 2rem 0;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--medium-grey);
        }

        .divider span {
            position: relative;
            display: inline-block;
            padding: 0 1rem;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-light);
            font-size: 0.875rem;
        }

        /* Footer Text */
        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--medium-grey);
        }

        .login-footer p {
            color: var(--text-light);
            font-size: 0.875rem;
            margin: 0;
        }

        /* Loading Spinner for Button */
        .btn-login .spinner-border {
            width: 1rem;
            height: 1rem;
            border-width: 2px;
            margin-right: 0.5rem;
        }

        /* Responsive Design */
        @media (max-width: 576px) {
            .login-card {
                padding: 2rem 1.5rem;
            }

            .login-container {
                max-width: 95%;
            }

            .login-title {
                font-size: 1.5rem;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
        }

        /* Error State */
        .form-control.is-invalid {
            border-color: var(--danger-red);
        }

        .invalid-feedback {
            display: none;
            color: var(--danger-red);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .form-control.is-invalid~.invalid-feedback {
            display: block;
        }
    </style>
</head>

<body>
    <!--පසුබිම සහිත පිවිසුම් Wrapper -->
    <!-- Login Wrapper with Background -->
    <div class="login-wrapper">

        <!-- Blurred පසුබිම (අනාගතයේදී සැබෑ image එකක් දමන්න) -->
        <!-- Blurred Background (Replace with actual image path) -->
        <div class="login-background" style="background-image: url('background-grocery.jpg');"></div>

        <!-- අඳුරු Overlay - පසුබිම ස්වල්පයක් අඳුරු කිරීම සඳහා -->
        <!-- Dark Overlay -->
        <div class="login-overlay"></div>

        <!-- පිවිසුම් Container - ප්‍රධාන form එක මෙහි -->
        <!-- Login Container -->
        <div class="login-container">
            <div class="login-card">

                <!-- Logo සහ ශීර්ෂය -->
                <!-- Logo and Title -->
                <div class="login-logo">
                    <div class="logo-icon">
                        <i class="fas fa-leaf"></i>
                    </div>
                    <h1 class="login-title">Sampath Grocery Store</h1>
                    <p class="login-subtitle">Welcome back! Please login to your account</p>
                </div>

                <!-- පිවිසුම් Form - මෙතැනින් login වෙන්න -->
                <!-- Login Form -->
                <form id="loginForm" novalidate>

                    <!-- පරිශීලක නම Field -->
                    <!-- Username Field -->
                    <div class="form-group">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1"></i> Username
                        </label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" class="form-control" id="username" name="username"
                                placeholder="Enter your username" required autocomplete="username">
                            <div class="invalid-feedback">
                                Please enter your username.
                            </div>
                        </div>
                    </div>

                    <!-- මුරපදය Field - සඟවන්න/පෙන්වන්න බොත්තම සමඟ -->
                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i> Password
                        </label>
                        <div class="input-icon-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Enter your password" required autocomplete="current-password">
                            <!-- මුරපදය පෙන්වන/සඟවන බොත්තම -->
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                            <div class="invalid-feedback">
                                Please enter your password.
                            </div>
                        </div>
                    </div>

                    <!-- මට මතක තබාගන්න & මුරපදය අමතකද? -->
                    <!-- Remember Me & Forgot Password -->
                    <div class="remember-forgot">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="forgot-password" id="forgotPasswordLink">
                            Forgot Password?
                        </a>
                    </div>

                    <!-- පිවිසුම් බොත්තම - මෙය click කරන විට login.js file එකේ function එක run වෙනවා -->
                    <!-- Login Button -->
                    <button type="submit" class="btn btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <!-- පාදකය - Copyright තොරතුරු -->
                <!-- Footer -->
                <div class="login-footer">
                    <p>
                        <i class="fas fa-shield-alt me-1"></i>
                        Secure Login | © 2025 Sampath Grocery Store
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS - සියලුම Bootstrap components සඳහා -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert2 JS - විචිත්‍රවත් alert messages සඳහා -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.all.min.js"></script>

    <!-- Custom JS - පිවිසුම් logic සඳහා (form validation, API calls)ttps://cdn.jsdelivr.net/npm/sweetalert2@11.10.1/dist/sweetalert2.all.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/login.js"></script>
</body>

</html>
